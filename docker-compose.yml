services:
  fileserver:
    build: .
    container_name: fileserver
    ports:
      - "8080:8080"
    # ボリューム。コンテナは非rootユーザー(UID 65532)で動作するため、
    # ホスト側ディレクトリは 65532 が書き込める必要がある（下記参照）。
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped
    networks:
      - fileserver_network

networks:
  fileserver_network:
    driver: bridge
