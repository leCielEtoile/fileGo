services:
  fileserver:
    build: .
    container_name: fileserver
    # 実行UID/GID。bindマウントへ書き込むファイルの所有者はこのUID/GIDになる。
    # PUID/PGIDを .env でホストユーザー（id -u / id -g）に合わせると、
    # 生成ファイルをホストユーザーがそのまま管理・削除できる。
    # 未指定時はイメージ既定の非rootユーザー(65532)で動作する（後方互換）。
    user: "${PUID:-65532}:${PGID:-65532}"
    ports:
      - "8080:8080"
    # ボリューム。ホスト側 ./config ./data は上記 user が書き込める必要がある。
    # 例: mkdir -p config data && sudo chown -R "$(id -u):$(id -g)" config data
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Asia/Tokyo}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    # アプリはstdoutへJSONログを出す。ホスト側で無制限に肥大化しないよう
    # Dockerのjson-fileドライバでローテーションする。
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fileserver_network

networks:
  fileserver_network:
    driver: bridge
