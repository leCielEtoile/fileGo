services:
  fileserver:
    # GitHub Container Registry からイメージを取得
    # タグの例: latest, v1.0.0, main-abc1234
    image: ghcr.io/lecieletoile/filego:${IMAGE_TAG:-latest}
    container_name: fileserver

    # 実行UID/GID。bindマウントへ書き込むファイルの所有者はこのUID/GIDになる。
    # PUID/PGIDを .env でホストユーザー（id -u / id -g）に合わせると、
    # 生成ファイルをホストユーザーがそのまま管理・削除できる。
    # 未指定時はイメージ既定の非rootユーザー(65532)で動作する（後方互換）。
    user: "${PUID:-65532}:${PGID:-65532}"

    # ポート設定
    ports:
      - "${HOST_PORT:-8080}:8080"

    # ボリュームマウント
    # ホスト側ディレクトリは上記 user が書き込める必要がある。
    # 例: mkdir -p config data && sudo chown -R "$(id -u):$(id -g)" config data
    volumes:
      # 設定ファイルとデータベース（初回起動時に自動生成）
      - ./config:/app/config:rw
      # アップロードファイル保存先
      - ./data:/app/data:rw

    # 環境変数
    environment:
      - TZ=${TZ:-Asia/Tokyo}

    # 環境変数ファイルから読み込み（オプション）
    env_file:
      - .env

    # 自動再起動設定
    restart: unless-stopped

    # ヘルスチェック（最小イメージにはwget等が無いためバイナリ自身で確認）
    healthcheck:
      test: ["CMD", "/app/fileserver", "-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # ログ設定（ローテーション）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=fileserver"

    # リソース制限
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # セキュリティ設定
    # イメージは既定で非rootユーザー(UID 65532)として動作する。
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # ネットワーク設定
    networks:
      - fileserver_network

networks:
  fileserver_network:
    driver: bridge

