services:
  fileserver:
    # GitHub Container Registry からイメージを取得
    # タグの例: latest, v1.0.0, main-abc1234
    image: ghcr.io/lecieletoile/filego:${IMAGE_TAG:-latest}
    container_name: fileserver

    # ポート設定
    ports:
      - "${HOST_PORT:-8080}:8080"

    # ボリュームマウント
    # コンテナは非rootユーザー(UID 65532)で動作するため、ホスト側ディレクトリは
    # 65532 が書き込める必要がある（例: chown -R 65532:65532 ./config ./data）。
    volumes:
      # 設定ファイルとデータベース（初回起動時に自動生成）
      - ./config:/app/config:rw
      # アップロードファイル保存先
      - ./data:/app/data:rw

    # 環境変数
    environment:
      - TZ=${TZ:-Asia/Tokyo}

    # 環境変数ファイルから読み込み（オプション）
    env_file:
      - .env

    # 自動再起動設定
    restart: unless-stopped

    # ヘルスチェック（最小イメージにはwget等が無いためバイナリ自身で確認）
    healthcheck:
      test: ["CMD", "/app/fileserver", "-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # ログ設定（ローテーション）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=fileserver"

    # リソース制限
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # セキュリティ設定
    # イメージは既定で非rootユーザー(UID 65532)として動作する。
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # ネットワーク設定
    networks:
      - fileserver_network

networks:
  fileserver_network:
    driver: bridge

